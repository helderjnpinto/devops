kind: DaemonSet

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  tag: "5.0.2"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 50m
    memory: 64Mi

rbac:
  create: true

serviceAccount:
  create: true
  name: fluentbit
  annotations: {}

existingConfigMap: fluentbit-config

env:
  - name: OPENOBSERVE_HOST
    valueFrom:
      secretKeyRef:
        name: openobserve-credentials
        key: host
  - name: OPENOBSERVE_PORT
    valueFrom:
      secretKeyRef:
        name: openobserve-credentials
        key: port
  - name: OPENOBSERVE_USERNAME
    valueFrom:
      secretKeyRef:
        name: openobserve-credentials
        key: username
  - name: OPENOBSERVE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: openobserve-credentials
        key: password

# Needed because the chart defaults to fluent-bit.conf, not fluent-bit.yaml
args:
  - --workdir=/fluent-bit/etc
  - --config=/fluent-bit/etc/conf/fluent-bit.yaml

service:
  type: ClusterIP
  port: 2020

serviceMonitor:
  enabled: false

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
affinity: {}
tolerations: []

# Override chart defaults for GKE Autopilot:
# only /var/log, and read-only
daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true

networkPolicy:
  enabled: false

podAnnotations: {}
podLabels: {}

luaScripts:
  filter_health.lua: |
    function drop_health_200(tag, ts, record)
      local url = record["url"]
      local status = tonumber(record["status"])

      -- Case 1: structured logs (already parsed)
      if url and status then
        if (url == "/health" or
            url == "/healthz" or
            url == "/ready" or
            url == "/readyz" or
            url == "/live" or
            url == "/ping" or
            url == "/status" or
            url == "/api/health")
          and status == 200 then
          return -1, ts, record
        end
      end

      -- Case 2: raw log string
      local log = record["log"]
      if log then
        -- match: "GET .../health... HTTP/1.1" ... - 200
        local is_health = string.match(log, 'GET%s+.-/(healthz?|readyz?|live|ping|status|api/health)')
        local is_200 = string.match(log, '%s%- %s*200%s')

        if is_health and is_200 then
          return -1, ts, record
        end
      end

      return 1, ts, record
    end


