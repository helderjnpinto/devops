service:
  flush: 1
  daemon: off
  log_level: info
  http_server: on
  http_listen: 0.0.0.0
  http_port: 2020

pipeline:
  inputs:
    - name: dummy
      tag: test
      rate: 10
      samples: 1

    - name: tail
      path: /var/log/*.log
      tag: system.*
      read_from_head: true
      skip_long_lines: on
      db: /fluent-bit/data/flb_tail.db
      mem_buf_limit: 5MB

  outputs:
    - name: stdout
      match: "*"
      format: json_lines

    - name: file
      match: "*"
      path: /fluent-bit/data
      file: output.log
      format: json_lines
