service:
  flush: 1
  daemon: off
  log_level: info
  http_server: on
  http_listen: 0.0.0.0
  http_port: 2020
  hot_reload: on

pipeline:
  inputs:
    - name: dummy
      tag: test
      rate: 10
      samples: 1

    - name: cpu
      tag: metrics.cpu
      interval_sec: 5

    - name: mem
      tag: metrics.memory
      interval_sec: 5

    - name: systemd
      tag: systemd.logs
      systemd_filter: _SYSTEMD_UNIT=docker.service
      read_from_tail: true
      db: /fluent-bit/data/flb_systemd.db

    - name: tail
      path: /var/log/*.log
      tag: system.*
      read_from_head: true
      skip_long_lines: on
      db: /fluent-bit/data/flb_tail.db
      mem_buf_limit: 5MB

  outputs:
    - name: stdout
      match: "*"
      format: json_lines

    - name: http
      match: "*"
      host: host.docker.internal
      port: 5080
      uri: /api/default/default/_json
      format: json
      compress: gzip
      Json_date_key: _timestamp
      Json_date_format: iso8601
      http_user: admin@example.com
      http_passwd: StrongPassword123!
      header: "Content-Type: application/json"
      header: "X-Org-Default: default"
