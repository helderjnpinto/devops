# Fluent Bit Configuration for OpenObserve Integration
# This configuration provides comprehensive observability with custom filtering

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/containers/*.log
    Parser            docker
    Tag               kube.*
    Refresh_Interval  5
    Rotate_Wait       30
    Skip_Long_Lines   On
    Skip_Empty_Lines  On
    DB                /var/log/flb_kube.db
    Mem_Buf_Limit     50MB
    Buffer_Chunk_Size 32KB
    Buffer_Max_Size   64KB

# Kubernetes Filter - Enrich logs with Kubernetes metadata
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Meta_Cache_TTL 300s
    Merge_Log           On
    Merge_Log_Key       log_processed
    Keep_Log            Off
    K8S_Logging_Parser  On
    K8S_Logging_Exclude Off
    Labels              On
    Annotations         On

# Custom Filter 1: Include only observability-enabled services
[FILTER]
    Name                grep
    Match               kube.*
    Regex               kubernetes.labels.observability enabled

# Custom Filter 2: Filter by specific namespaces (optional)
[FILTER]
    Name                grep
    Match               kube.*
    Regex               kubernetes.namespace_name ^(production|staging|monitoring)$

# Custom Filter 3: Exclude debug logs from production
[FILTER]
    Name                grep
    Match               kube.*
    Exclude             kubernetes.namespace_name production
    Exclude             kubernetes.labels.log_level debug

# Custom Filter 4: Add environment and service metadata
[FILTER]
    Name                record_modifier
    Match               kube.*
    Record              environment ${ENVIRONMENT:-development}
    Record              cluster_name ${CLUSTER_NAME:-local}
    Record              collector fluent-bit

# Custom Filter 5: Process JSON logs and extract fields
[FILTER]
    Name                parser
    Match               kube.*
    Key_Name            log_processed
    Parser              json
    Reserve_Data        On

# Custom Filter 6: Add service classification based on labels
[FILTER]
    Name                modify
    Match               kube.*
    Add                 service_type unknown
    Condition           Key_exists kubernetes.labels.app.kubernetes.io/name
    Set                 service_type ${kubernetes.labels.app.kubernetes.io/name}

# Custom Filter 7: Remove sensitive information
[FILTER]
    Name                modify
    Match               kube.*
    Remove              password
    Remove              secret
    Remove              token
    Remove              api_key

# Custom Filter 8: Standardize timestamp format
[FILTER]
    Name                modify
    Match               kube.*
    Rename              time timestamp
    Copy                timestamp @timestamp

# Custom Filter 9: Add correlation ID for tracing
[FILTER]
    Name                lua
    Match               kube.*
    Script              /fluent-bit/scripts/correlation.lua
    Call                add_correlation_id

# Output to OpenObserve
[OUTPUT]
    Name                http
    Match               kube.*
    Host                ${OPENOBSERVE_HOST}
    Port                ${OPENOBSERVE_PORT:-5080}
    URI                 /api/default/default/_json
    TLS                 Off
    Format              json
    Json_date_key       @timestamp
    Json_date_format    iso8601
    HTTP_User           ${OPENOBSERVE_USER}
    HTTP_Passwd        ${OPENOBSERVE_PASSWORD}
    Compress            gzip
    Retry_Limit         5

# Optional: Output to stdout for debugging
[OUTPUT]
    Name                stdout
    Match               kube.*
    Format              json_lines

# Health check endpoint
[HTTP_SERVER]
    Listen              0.0.0.0
    Port                2020
